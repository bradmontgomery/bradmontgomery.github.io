<!-- Example blog post template with timezone-aware dates -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>on beards</title>
</head>
<body>
    <article>
        <h1>on beards</h1>
        
        <!-- Published date with client-side timezone conversion -->
        
        <time datetime="2008-10-05T13:22:00+00:00" data-local="true">
            2008-10-05 13:22 UTC
        </time>
        
        
        <!-- Post content -->
        <div class="content">
            
<p>I just ran across an interesting <a href="http://www.vimeo.com/1819723">beard video on vimeo</a>. Lots of cool links including <a href="http://www.beards.org/">beards.org</a>, the <a href="http://www.worldbeardchampionships.com/">World Beard and Moustache Championships</a>, and the <a href="http://www.beardliberationfront.com/">BLF</a>.</p>
<p>Fun stuff.</p>

        </div>
    </article>
    
    <!-- Load timezone converter at end of page -->
    <script src="/static/js/timezone.js"></script>
</body>
</html>
