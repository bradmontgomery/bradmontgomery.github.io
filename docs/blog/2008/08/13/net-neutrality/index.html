<!-- Example blog post template with timezone-aware dates -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Net Neutrality</title>
</head>
<body>
    <article>
        <h1>Net Neutrality</h1>
        
        <!-- Published date with client-side timezone conversion -->
        
        <time datetime="2008-08-13T08:30:00+00:00" data-local="true">
            2008-08-13 08:30 UTC
        </time>
        
        
        <!-- Post content -->
        <div class="content">
            
<p><a href="http://foureyedmonsters.com/neutrality/"><img src="http://foureyedmonsters.com/video_podcast/images/neutrality.jpg" alt="" /></a><br />
<a href="http://www.savetheinternet.com/">Save the Internet</a> | <a href="http://rockthevote.com/">Rock the Vote</a></p>

        </div>
    </article>
    
    <!-- Load timezone converter at end of page -->
    <script src="/static/js/timezone.js"></script>
</body>
</html>
