<!-- Example blog post template with timezone-aware dates -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>That Looks about Right</title>
</head>
<body>
    <article>
        <h1>That Looks about Right</h1>
        
        <!-- Published date with client-side timezone conversion -->
        
        <time datetime="2008-12-04T16:27:00+00:00" data-local="true">
            2008-12-04 16:27 UTC
        </time>
        
        
        <!-- Post content -->
        <div class="content">
            <pre><code>  
 history | awk '{ print $2 }' | sort | uniq -c | sort -rn | head  
 152 cd  
 145 ll  
  73 vi  
  20 rm  
  18 svn  
  13 exit  
   9 ls  
   8 grep  
   7 php  
   5 wget  

</code></pre>
<p>via <a href="http://www.b-list.org/weblog/2008/apr/10/meme/">b-list.org</a></p>

        </div>
    </article>
    
    <!-- Load timezone converter at end of page -->
    <script src="/static/js/timezone.js"></script>
</body>
</html>
