<!-- Example blog post template with timezone-aware dates -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why Bluetooth headsets didn&#39;t catch on in the &#39;90s</title>
</head>
<body>
    <article>
        <h1>Why Bluetooth headsets didn&#39;t catch on in the &#39;90s</h1>
        
        <!-- Published date with client-side timezone conversion -->
        
        <time datetime="2008-07-12T10:12:00+00:00" data-local="true">
            2008-07-12 10:12 UTC
        </time>
        
        
        <!-- Post content -->
        <div class="content">
            
<p><img src="http://bradmontgomery.net/images/1990s_bluetooth.png" alt="Why bluetooth headsets did not catch on in the 90s" /></p>

        </div>
    </article>
    
    <!-- Load timezone converter at end of page -->
    <script src="/static/js/timezone.js"></script>
</body>
</html>
