<!-- Example blog post template with timezone-aware dates -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On select_related()</title>
</head>
<body>
    <article>
        <h1>On select_related()</h1>
        
        <!-- Published date with client-side timezone conversion -->
        
        <time datetime="2010-03-23T15:02:00+00:00" data-local="true">
            2010-03-23 15:02 UTC
        </time>
        
        
        <!-- Post content -->
        <div class="content">
            
<p>If you use <a href="http://www.djangoproject.com">Django</a>, and your models have relationships that span across multiple tables, you need to read this: <a href="http://docs.djangoproject.com/en/dev/ref/models/querysets/#id4">http://docs.djangoproject.com/en/dev/ref/models/querysets/#id4</a></p>
<p>select_related() is awesome.</p>
<p>That is all.</p>

        </div>
    </article>
    
    <!-- Load timezone converter at end of page -->
    <script src="/static/js/timezone.js"></script>
</body>
</html>
