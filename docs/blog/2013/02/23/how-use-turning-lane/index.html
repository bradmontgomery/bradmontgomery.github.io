<!-- Example blog post template with timezone-aware dates -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How to use a turning lane</title>
</head>
<body>
    <article>
        <h1>How to use a turning lane</h1>
        
        <!-- Published date with client-side timezone conversion -->

            2013-02-23 21:28 UTC
        </time>
        
        
        <!-- Post content -->
        <div class="content">
            
<p><img src="http://www.foib.us/im/how_to_use_a_turning_lane-20130223-142624.png" alt="how to use a turning lane" /></p>
<ol>
<li>Stop in the middle of the road</li>
<li>Slowly turn half-way into the turning lane</li>
<li>Wait forever</li>
</ol>

        </div>
    </article>
    
    <!-- Load timezone converter at end of page -->
    <script src="/static/js/timezone.js"></script>
</body>
</html>
