<!-- Example blog post template with timezone-aware dates -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixing Bugs.</title>
</head>
<body>
    <article>
        <h1>Fixing Bugs.</h1>
        
        <!-- Published date with client-side timezone conversion -->
        
        <time datetime="2012-09-25T22:44:13+00:00" data-local="true">
            2012-09-25 22:44 UTC
        </time>
        
        
        <!-- Post content -->
        <div class="content">
            
<p><img src="http://www.foib.us/im/fixing-bugs.png" alt="every. single. time." /></p>

        </div>
    </article>
    
    <!-- Load timezone converter at end of page -->
    <script src="/static/js/timezone.js"></script>
</body>
</html>
