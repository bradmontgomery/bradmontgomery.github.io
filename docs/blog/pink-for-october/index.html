<!-- Example blog post template with timezone-aware dates -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink for October</title>
</head>
<body>
    <article>
        <h1>Pink for October</h1>
        
        <!-- Published date with client-side timezone conversion -->
        
        <time datetime="2006-10-02T21:26:00+00:00" data-local="true">
            2006-10-02 21:26 UTC
        </time>
        
        
        <!-- Post content -->
        <div class="content">
            
<p><a href="http://en.wikipedia.org/wiki/Breast_cancer"><img src="http://bradmontgomery.net/images/Pink_ribbon.png" alt="Pink Ribbon for Breast Cancer" /></a> If you visit my site often (or even occasionally), you may have noticed a slight change. Well, it's sorta <a href="http://pinkforoctober.org/">Pink for October</a>, in honor of <a href="http://nbcam.org/">National Breast Cancer Awareness Month</a>. Also, my Mom's running in the <a href="http://www.ar-raceforthecure.org/">Little Rock Race for the Cure</a>... Good Luck!</p>

        </div>
    </article>
    
    <!-- Load timezone converter at end of page -->
    <script src="/static/js/timezone.js"></script>
</body>
</html>
