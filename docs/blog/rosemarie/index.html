<!-- Example blog post template with timezone-aware dates -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosemarie</title>
</head>
<body>
    <article>
        <h1>Rosemarie</h1>
        
        <!-- Published date with client-side timezone conversion -->
        
        <time datetime="2006-05-25T21:38:00+00:00" data-local="true">
            2006-05-25 21:38 UTC
        </time>
        
        
        <!-- Post content -->
        <div class="content">
            
<p>Well, Summer's almost here! So, if you're feeling the need to whip yourself back into shape, <a href="http://rosemarie.name">I know just the person</a>! :-)</p>

        </div>
    </article>
    
    <!-- Load timezone converter at end of page -->
    <script src="/static/js/timezone.js"></script>
</body>
</html>
