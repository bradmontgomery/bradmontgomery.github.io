<!-- Example blog post template with timezone-aware dates -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speak like a Pirate Day!</title>
</head>
<body>
    <article>
        <h1>Speak like a Pirate Day!</h1>
        
        <!-- Published date with client-side timezone conversion -->
        
        <time datetime="2006-09-19T21:28:00+00:00" data-local="true">
            2006-09-19 21:28 UTC
        </time>
        
        
        <!-- Post content -->
        <div class="content">
            
<p>Avast ye! As it be a day 'fer celebrat'n pirates, ye should be learn'n to <a href="http://loadingreadyrun.com/showmovie.php?x=480&amp;y=360&amp;url=talklikepirate.mov">speak like one</a>, and then <a href="http://en.wikipedia.org/wiki/Grog">drink like one</a>. So says I, <a href="http://bradmontgomery.net/show.php?page=pirate">Calico Sam Kidd</a></p>

        </div>
    </article>
    
    <!-- Load timezone converter at end of page -->
    <script src="/static/js/timezone.js"></script>
</body>
</html>
