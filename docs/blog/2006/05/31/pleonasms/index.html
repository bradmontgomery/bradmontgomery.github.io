<!-- Example blog post template with timezone-aware dates -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pleonasms...</title>
</head>
<body>
    <article>
        <h1>Pleonasms...</h1>
        
        <!-- Published date with client-side timezone conversion -->
        
        <time datetime="2006-05-31T21:38:00+00:00" data-local="true">
            2006-05-31 21:38 UTC
        </time>
        
        
        <!-- Post content -->
        <div class="content">
            
<p>Spare me your <a href="http://dictionary.reference.com/wordoftheday/archive/2006/05/31.html">pleonasms</a>, and I shall strive to do the same! :)</p>

        </div>
    </article>
    
    <!-- Load timezone converter at end of page -->
    <script src="/static/js/timezone.js"></script>
</body>
</html>
