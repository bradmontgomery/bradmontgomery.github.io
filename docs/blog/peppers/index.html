<!-- Example blog post template with timezone-aware dates -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peppers!</title>
</head>
<body>
    <article>
        <h1>Peppers!</h1>
        
        <!-- Published date with client-side timezone conversion -->
        
        <time datetime="2006-10-01T21:26:00+00:00" data-local="true">
            2006-10-01 21:26 UTC
        </time>
        
        
        <!-- Post content -->
        <div class="content">
            
<p>Thanks to my grandparents, I'm now in possession of quite a few <a href="http://en.wikipedia.org/wiki/Jalape%C3%B1o">Capsicum annuum chile peppers</a>! Everybody that knows me, knows that I'm quite of fan of these. I'm guessing it will take me a day or two to eat all of these... I guess we'll see :)</p>
<p><a href="http://bradmontgomery.net/images/jalapenos.jpg"><img src="http://bradmontgomery.net/images/jalapenos.jpg" alt="Jalapenos!" /></a></p>

        </div>
    </article>
    
    <!-- Load timezone converter at end of page -->
    <script src="/static/js/timezone.js"></script>
</body>
</html>
