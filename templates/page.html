{% extends "base.html" %}

{% block extra_header %}
  <p class="post-meta">
    {% if date %}Published on {{ date }}{% endif %}
    {% if date and tags|length > 0 %}&nbsp;&middot;&nbsp;{% endif %}
    {% if tags|length > 0 %}{% for tag in tags %}<span class="tag">{{ tag }}</span>{% endfor %}{% endif %}
  </p>
{% endblock %}

{% block body%}
  <section>
  {{ html_content|safe }}
  </section>
{% endblock %}
