{% extends "base.html" %}
{% block body%}
  {% if draft %}<h1>DRAFT</h1>{% endif %}
  <section>
    {% if date %}
      <p>Published on:
        <time datetime="{{ date }}" data-local="true">{{ date }}</time>
      </p>
    {% endif %}
    {% if tags %}
      <p>Tags:
      {% for tag in tags %}
        <span class="tag">{{ tag }}</span>
      {% endfor %}
      </p>
    {% endif %}

    <article>
    {{ html_content|safe }}
    </article>
  </section>
{% endblock %}
